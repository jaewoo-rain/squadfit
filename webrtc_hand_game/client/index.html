<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>손 인식 게임</title>
    <style>
      canvas,
      video {
        position: absolute;
        top: 0;
        left: 0;
        transform: scaleX(-1);
      }
      #container {
        position: relative;
        width: 640px;
        height: 480px;
      }
      h2 {
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <h2>점수: <span id="score">0</span></h2>
    <div id="container">
      <video
        id="video"
        autoplay
        muted
        playsinline
        width="640"
        height="480"
      ></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    <script src="app.js"></script>
  </body>
</html>
